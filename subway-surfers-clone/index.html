<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Subway Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; }

  #ui {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; user-select: none;
  }

  #hud {
    display: none; padding: 20px 30px;
    justify-content: space-between; align-items: flex-start;
  }
  #hud.active { display: flex; }

  .hud-box {
    background: rgba(0,0,0,0.4); border-radius: 12px;
    padding: 10px 18px; color: #fff; text-align: center;
    backdrop-filter: blur(6px);
  }
  .hud-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
  .hud-value { font-size: 28px; font-weight: 700; }
  #coins-display .hud-value { color: #ffd700; }

  #powerups-container {
    position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; pointer-events: none;
  }
  .powerup-indicator {
    display: none; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.5); border-radius: 20px;
    padding: 6px 14px; color: #fff; font-size: 13px; font-weight: 600;
    backdrop-filter: blur(6px); white-space: nowrap;
  }
  .powerup-indicator.active { display: flex; }
  .powerup-bar {
    width: 60px; height: 6px; background: rgba(255,255,255,0.2);
    border-radius: 3px; overflow: hidden;
  }
  .powerup-bar-fill {
    height: 100%; border-radius: 3px; transition: width 0.1s linear;
  }

  #menu-screen, #gameover-screen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: auto;
  }

  #menu-screen {
    background: linear-gradient(135deg, rgba(26,58,107,0.95), rgba(44,83,147,0.95));
  }
  #gameover-screen {
    background: rgba(0,0,0,0.85); display: none;
  }

  .title {
    font-size: 64px; font-weight: 900; color: #fff;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    margin-bottom: 8px; letter-spacing: -2px;
  }
  .subtitle {
    font-size: 16px; color: rgba(255,255,255,0.7);
    margin-bottom: 40px; letter-spacing: 4px; text-transform: uppercase;
  }

  .btn {
    background: linear-gradient(135deg, #ff6b35, #ff4500);
    color: #fff; border: none; border-radius: 50px;
    padding: 16px 60px; font-size: 22px; font-weight: 700;
    cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 6px 25px rgba(255,69,0,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    pointer-events: auto;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,69,0,0.6); }
  .btn:active { transform: translateY(1px); }

  .go-stats {
    color: #fff; text-align: center; margin-bottom: 30px;
  }
  .go-stats .go-label { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; margin-bottom: 4px; }
  .go-stats .go-value { font-size: 42px; font-weight: 800; }
  .go-stats .go-coins { color: #ffd700; font-size: 24px; margin-top: 8px; }
  .go-stats .go-best { color: #aaa; font-size: 14px; margin-top: 12px; }

  .controls-hint {
    color: rgba(255,255,255,0.5); font-size: 13px;
    margin-top: 24px; text-align: center; line-height: 1.8;
  }

  #mobile-controls {
    display: none; position: absolute; bottom: 30px; left: 0; width: 100%;
    justify-content: center; gap: 20px; pointer-events: auto;
  }
  .mobile-btn {
    width: 70px; height: 70px; border-radius: 50%;
    background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #fff; cursor: pointer;
    backdrop-filter: blur(4px);
  }
  .mobile-btn:active { background: rgba(255,255,255,0.35); }

  .score-popup {
    position: absolute; pointer-events: none;
    color: #ffd700; font-size: 20px; font-weight: 800;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    animation: popup float 0.8s ease-out forwards;
  }

  @keyframes float {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
  }

  @media (max-width: 768px) {
    .title { font-size: 42px; }
    #mobile-controls { display: flex; }
  }
</style>
</head>
<body>

<div id="ui">
  <div id="hud">
    <div class="hud-box" id="score-display">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="score-value">0</div>
    </div>
    <div class="hud-box" id="coins-display">
      <div class="hud-label">Coins</div>
      <div class="hud-value" id="coins-value">0</div>
    </div>
  </div>

  <div id="powerups-container">
    <div class="powerup-indicator" id="pu-magnet">
      <span>Magnet</span>
      <div class="powerup-bar"><div class="powerup-bar-fill" id="pu-magnet-bar" style="background:#ff4444;width:100%"></div></div>
    </div>
    <div class="powerup-indicator" id="pu-multiplier">
      <span>2x</span>
      <div class="powerup-bar"><div class="powerup-bar-fill" id="pu-multiplier-bar" style="background:#4488ff;width:100%"></div></div>
    </div>
    <div class="powerup-indicator" id="pu-jetpack">
      <span>Jetpack</span>
      <div class="powerup-bar"><div class="powerup-bar-fill" id="pu-jetpack-bar" style="background:#ff8800;width:100%"></div></div>
    </div>
    <div class="powerup-indicator" id="pu-hoverboard">
      <span>Hoverboard</span>
      <div class="powerup-bar"><div class="powerup-bar-fill" id="pu-hoverboard-bar" style="background:#44ff88;width:100%"></div></div>
    </div>
  </div>

  <div id="menu-screen">
    <div class="title">Subway Runner</div>
    <div class="subtitle">Endless Runner</div>
    <button class="btn" id="play-btn">PLAY</button>
    <div class="controls-hint">
      ← → or A/D to switch lanes<br>
      ↑ or W or SPACE to jump &nbsp;|&nbsp; ↓ or S to roll<br>
      Swipe on mobile
    </div>
  </div>

  <div id="gameover-screen">
    <div class="go-stats">
      <div class="go-label">Score</div>
      <div class="go-value" id="go-score">0</div>
      <div class="go-coins" id="go-coins">0 coins</div>
      <div class="go-best" id="go-best"></div>
    </div>
    <button class="btn" id="retry-btn">PLAY AGAIN</button>
  </div>

  <div id="mobile-controls">
    <div class="mobile-btn" id="btn-left">◀</div>
    <div class="mobile-btn" id="btn-jump">▲</div>
    <div class="mobile-btn" id="btn-down">▼</div>
    <div class="mobile-btn" id="btn-right">▶</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}

<script type="module">
import * as THREE from 'three';

// ── Constants ──
const LANE_WIDTH = 3;
const LANES = [-LANE_WIDTH, 0, LANE_WIDTH];
const PLAYER_WIDTH = 0.8;
const PLAYER_HEIGHT = 1.8;
const JUMP_HEIGHT = 4;
const JUMP_DURATION = 0.6;
const ROLL_DURATION = 0.5;
const BASE_SPEED = 16;
const MAX_SPEED = 34;
const SPEED_INCREMENT = 0.003;
const SPAWN_DISTANCE = 120;
const DESPAWN_DISTANCE = 20;
const COIN_RADIUS = 0.35;

const POWERUP_TYPES = {
  magnet: { color: 0xff4444, duration: 8, radius: 8 },
  multiplier: { color: 0x4488ff, duration: 10, factor: 2 },
  jetpack: { color: 0xff8800, duration: 6, height: 6 },
  hoverboard: { color: 0x44ff88, duration: 7 }
};

// ── State ──
let scene, camera, renderer, clock;
let player, playerLane = 1, targetX = 0;
let isJumping = false, jumpTime = 0, jumpStartY = 0;
let isRolling = false, rollTimer = 0;
let speed = BASE_SPEED, score = 0, coins = 0;
let gameActive = false;
let obstacles = [], coinObjects = [], powerupObjects = [], buildings = [], clouds = [], groundDetails = [];
let highScore = parseInt(localStorage.getItem('subwayRunnerHigh') || '0');
let spawnTimer = 0, powerupSpawnTimer = 0;
let activePowerups = { magnet: 0, multiplier: 0, jetpack: 0, hoverboard: 0 };
let hoverboardMesh = null;
let playerParts = {};

// Particles
let particles = [];
const MAX_PARTICLES = 500;

// Camera shake
let shakeIntensity = 0, shakeDuration = 0;

// Audio context
let audioCtx = null;

// ── Audio ──
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const t = audioCtx.currentTime;

  switch (type) {
    case 'coin':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(1320, t + 0.1);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t); osc.stop(t + 0.15);
      break;
    case 'powerup':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, t);
      osc.frequency.exponentialRampToValueAtTime(880, t + 0.15);
      osc.frequency.exponentialRampToValueAtTime(1320, t + 0.3);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.4);
      break;
    case 'crash':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(50, t + 0.3);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.4);
      break;
    case 'jump':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, t);
      osc.frequency.exponentialRampToValueAtTime(600, t + 0.12);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t); osc.stop(t + 0.15);
      break;
  }
}

// ── Particles ──
function spawnParticles(position, count, color, spread, speed, life, size) {
  for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
    const geo = new THREE.SphereGeometry(size || 0.08, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(position);
    scene.add(mesh);
    particles.push({
      mesh,
      velocity: new THREE.Vector3(
        (Math.random() - 0.5) * spread,
        Math.random() * spread * 0.8,
        (Math.random() - 0.5) * spread
      ),
      life: life || 0.6,
      maxLife: life || 0.6,
      baseSpeed: speed || 3
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
      continue;
    }
    p.velocity.y -= 8 * dt;
    p.mesh.position.add(p.velocity.clone().multiplyScalar(dt * p.baseSpeed));
    p.mesh.material.opacity = p.life / p.maxLife;
    p.mesh.scale.setScalar(p.life / p.maxLife);
  }
}

// ── Score Popup ──
function showScorePopup(text, color) {
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = text;
  popup.style.color = color || '#ffd700';
  popup.style.left = `${window.innerWidth / 2 - 20}px`;
  popup.style.top = `${window.innerHeight / 2 - 60}px`;
  document.getElementById('ui').appendChild(popup);
  setTimeout(() => popup.remove(), 800);
}

// ── Init ──
function init() {
  scene = new THREE.Scene();

  // Sky gradient
  const skyGeo = new THREE.SphereGeometry(150, 32, 32);
  const skyMat = new THREE.ShaderMaterial({
    uniforms: {
      topColor: { value: new THREE.Color(0x0077ff) },
      bottomColor: { value: new THREE.Color(0x87CEEB) },
      offset: { value: 20 },
      exponent: { value: 0.4 }
    },
    vertexShader: `
      varying vec3 vWorldPosition;
      void main() {
        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPosition.xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 topColor;
      uniform vec3 bottomColor;
      uniform float offset;
      uniform float exponent;
      varying vec3 vWorldPosition;
      void main() {
        float h = normalize(vWorldPosition + offset).y;
        gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
      }
    `,
    side: THREE.BackSide
  });
  const sky = new THREE.Mesh(skyGeo, skyMat);
  scene.add(sky);

  scene.fog = new THREE.Fog(0x87CEEB, 70, 150);

  camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 6, 8);
  camera.lookAt(0, 1, -10);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.insertBefore(renderer.domElement, document.getElementById('ui'));

  clock = new THREE.Clock();

  // Lights
  const ambient = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambient);

  const hemi = new THREE.HemisphereLight(0x87CEEB, 0x555555, 0.4);
  scene.add(hemi);

  const sun = new THREE.DirectionalLight(0xfff4e0, 1.4);
  sun.position.set(10, 30, 10);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left = -30;
  sun.shadow.camera.right = 30;
  sun.shadow.camera.top = 30;
  sun.shadow.camera.bottom = -30;
  sun.shadow.bias = -0.001;
  scene.add(sun);

  createGround();
  createPlayer();
  createEnvironment();
  createClouds();

  window.addEventListener('resize', onResize);
  setupControls();
  animate();
}

// ── Ground ──
function createGround() {
  // Main road
  const roadGeo = new THREE.PlaneGeometry(LANE_WIDTH * 3 + 2, 300);
  const roadMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.85 });
  const road = new THREE.Mesh(roadGeo, roadMat);
  road.rotation.x = -Math.PI / 2;
  road.position.z = -100;
  road.receiveShadow = true;
  scene.add(road);

  // Sidewalks
  for (let side of [-1, 1]) {
    const swGeo = new THREE.BoxGeometry(2, 0.2, 300);
    const swMat = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.7 });
    const sw = new THREE.Mesh(swGeo, swMat);
    sw.position.set(side * (LANE_WIDTH * 1.5 + 2), 0.1, -100);
    sw.receiveShadow = true;
    sw.castShadow = true;
    scene.add(sw);
  }

  // Lane dividers (dashed)
  for (let lane of [-1.5, 1.5]) {
    for (let z = 0; z > -300; z -= 4) {
      const dashGeo = new THREE.PlaneGeometry(0.1, 2);
      const dashMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
      const dash = new THREE.Mesh(dashGeo, dashMat);
      dash.rotation.x = -Math.PI / 2;
      dash.position.set(lane, 0.01, z);
      scene.add(dash);
      groundDetails.push(dash);
    }
  }

  // Train rails
  for (let lane of [-1.5, 1.5]) {
    for (let r = 0; r < 2; r++) {
      const railGeo = new THREE.BoxGeometry(0.06, 0.05, 300);
      const railMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.9, roughness: 0.3 });
      const rail = new THREE.Mesh(railGeo, railMat);
      rail.position.set(lane + (r - 0.5) * 1.0, 0.025, -100);
      scene.add(rail);
    }
  }

  // Rail ties
  for (let lane of [-1.5, 1.5]) {
    for (let z = 0; z > -300; z -= 1.5) {
      const tieGeo = new THREE.BoxGeometry(1.4, 0.04, 0.2);
      const tieMat = new THREE.MeshStandardMaterial({ color: 0x5c4033 });
      const tie = new THREE.Mesh(tieGeo, tieMat);
      tie.position.set(lane, 0.02, z);
      scene.add(tie);
      groundDetails.push(tie);
    }
  }
}

// ── Player ──
function createPlayer() {
  player = new THREE.Group();

  // Body
  const bodyGeo = new THREE.BoxGeometry(0.6, 0.7, 0.4);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.4 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 1.1;
  body.castShadow = true;
  player.add(body);

  // Head
  const headGeo = new THREE.SphereGeometry(0.25, 16, 16);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc99, roughness: 0.6 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.7;
  head.castShadow = true;
  player.add(head);

  // Cap
  const capGeo = new THREE.BoxGeometry(0.32, 0.12, 0.38);
  const capMat = new THREE.MeshStandardMaterial({ color: 0x2244aa, roughness: 0.3 });
  const cap = new THREE.Mesh(capGeo, capMat);
  cap.position.set(0, 1.9, -0.06);
  player.add(cap);

  // Cap brim
  const brimGeo = new THREE.BoxGeometry(0.32, 0.04, 0.15);
  const brim = new THREE.Mesh(brimGeo, capMat);
  brim.position.set(0, 1.88, -0.28);
  player.add(brim);

  // Shoes
  const shoeGeo = new THREE.BoxGeometry(0.22, 0.15, 0.3);
  const shoeMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
  const leftShoe = new THREE.Mesh(shoeGeo, shoeMat);
  leftShoe.position.set(-0.15, 0.075, 0.05);
  leftShoe.castShadow = true;
  player.add(leftShoe);
  const rightShoe = new THREE.Mesh(shoeGeo, shoeMat);
  rightShoe.position.set(0.15, 0.075, 0.05);
  rightShoe.castShadow = true;
  player.add(rightShoe);

  // Legs
  const legGeo = new THREE.BoxGeometry(0.2, 0.5, 0.2);
  const legMat = new THREE.MeshStandardMaterial({ color: 0x334466, roughness: 0.5 });
  const leftLeg = new THREE.Mesh(legGeo, legMat);
  leftLeg.position.set(-0.15, 0.35, 0);
  leftLeg.castShadow = true;
  player.add(leftLeg);
  const rightLeg = new THREE.Mesh(legGeo, legMat);
  rightLeg.position.set(0.15, 0.35, 0);
  rightLeg.castShadow = true;
  player.add(rightLeg);

  // Arms
  const armGeo = new THREE.BoxGeometry(0.15, 0.5, 0.15);
  const armMat = new THREE.MeshStandardMaterial({ color: 0xffcc99, roughness: 0.6 });
  const leftArm = new THREE.Mesh(armGeo, armMat);
  leftArm.position.set(-0.4, 1.0, 0);
  player.add(leftArm);
  const rightArm = new THREE.Mesh(armGeo, armMat);
  rightArm.position.set(0.4, 1.0, 0);
  player.add(rightArm);

  // Backpack
  const packGeo = new THREE.BoxGeometry(0.4, 0.45, 0.2);
  const packMat = new THREE.MeshStandardMaterial({ color: 0x44aa44, roughness: 0.5 });
  const pack = new THREE.Mesh(packGeo, packMat);
  pack.position.set(0, 1.1, 0.28);
  pack.castShadow = true;
  player.add(pack);

  // Store references for animation
  playerParts = { body, head, cap, brim, leftLeg, rightLeg, leftArm, rightArm, leftShoe, rightShoe, pack };

  player.position.set(0, 0, 0);
  scene.add(player);
}

// ── Environment ──
function createEnvironment() {
  for (let i = 0; i < 30; i++) {
    createBuilding(-true, -i * 10);
    createBuilding(true, -i * 10);
  }
}

function createBuilding(side, z) {
  const group = new THREE.Group();
  const w = 2 + Math.random() * 4;
  const h = 5 + Math.random() * 20;
  const d = 3 + Math.random() * 4;
  const hue = Math.random();
  const color = new THREE.Color().setHSL(hue, 0.15 + Math.random() * 0.25, 0.35 + Math.random() * 0.25);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.7 });
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = h / 2;
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  group.add(mesh);

  // Roof detail
  if (Math.random() > 0.5) {
    const roofGeo = new THREE.BoxGeometry(w * 0.6, 0.5, d * 0.6);
    const roofMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.y = h + 0.25;
    roof.castShadow = true;
    group.add(roof);
  }

  // AC unit on roof
  if (Math.random() > 0.6) {
    const acGeo = new THREE.BoxGeometry(0.8, 0.6, 0.6);
    const acMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.5 });
    const ac = new THREE.Mesh(acGeo, acMat);
    ac.position.set((Math.random() - 0.5) * w * 0.4, h + 0.55, (Math.random() - 0.5) * d * 0.3);
    group.add(ac);
  }

  const x = (side ? 1 : -1) * (LANE_WIDTH * 1.5 + 4 + w / 2 + Math.random() * 3);
  group.position.set(x, 0, z);
  scene.add(group);
  buildings.push(group);

  // Windows
  const winMat = new THREE.MeshStandardMaterial({
    color: 0xffffcc, emissive: 0xffffcc, emissiveIntensity: 0.4, roughness: 0.2
  });
  const darkWinMat = new THREE.MeshStandardMaterial({
    color: 0x334455, roughness: 0.3
  });
  for (let wy = 2; wy < h - 1; wy += 2.5) {
    for (let wx = -w / 2 + 1; wx < w / 2; wx += 1.5) {
      if (Math.random() > 0.3) {
        const winGeo = new THREE.PlaneGeometry(0.55, 0.75);
        const mat = Math.random() > 0.4 ? winMat : darkWinMat;
        const win = new THREE.Mesh(winGeo, mat);
        win.position.set(
          x + (side ? -1 : 1) * (w / 2 + 0.01),
          wy,
          z + (Math.random() - 0.5) * d * 0.4
        );
        win.rotation.y = side ? 0 : Math.PI;
        scene.add(win);
        buildings.push(win);
      }
    }
  }
}

function createClouds() {
  for (let i = 0; i < 15; i++) {
    const group = new THREE.Group();
    const count = 3 + Math.floor(Math.random() * 4);
    for (let j = 0; j < count; j++) {
      const size = 1 + Math.random() * 2;
      const geo = new THREE.SphereGeometry(size, 8, 8);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xffffff, transparent: true, opacity: 0.8, roughness: 1
      });
      const puff = new THREE.Mesh(geo, mat);
      puff.position.set(j * 1.5 - count * 0.5, Math.random() * 0.5, Math.random() * 0.5);
      puff.scale.y = 0.5;
      group.add(puff);
    }
    group.position.set(
      (Math.random() - 0.5) * 80,
      25 + Math.random() * 20,
      -Math.random() * 200
    );
    scene.add(group);
    clouds.push(group);
  }
}

// ── Obstacles ──
function spawnObstacle() {
  const lane = Math.floor(Math.random() * 3);
  const type = Math.random();

  if (type < 0.4) {
    // Train
    const h = 3 + Math.random() * 2;
    const w = 2.2;
    const d = 5 + Math.random() * 3;
    const colors = [0xcc3333, 0x3366cc, 0x33aa55, 0xcc8833, 0x8833cc, 0xdddddd];
    const color = colors[Math.floor(Math.random() * colors.length)];
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.3 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(LANES[lane], h / 2, -SPAWN_DISTANCE);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    obstacles.push({ mesh, lane, type: 'tall', h, w, d });

    // Train stripe
    const stripeGeo = new THREE.BoxGeometry(w + 0.05, 0.15, d + 0.05);
    const stripeMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.5 });
    const stripe = new THREE.Mesh(stripeGeo, stripeMat);
    stripe.position.set(LANES[lane], h * 0.7, -SPAWN_DISTANCE);
    scene.add(stripe);
    obstacles.push({ mesh: stripe, lane, type: 'deco' });

    // Train windows
    const winMat = new THREE.MeshStandardMaterial({
      color: 0x88bbdd, emissive: 0x4488aa, emissiveIntensity: 0.3,
      metalness: 0.8, roughness: 0.1
    });
    for (let wy = 1; wy < h - 1; wy += 1.3) {
      for (let wz = -d / 2 + 1.5; wz < d / 2 - 0.5; wz += 1.8) {
        const winGeo = new THREE.PlaneGeometry(0.6, 0.7);
        const win = new THREE.Mesh(winGeo, winMat);
        win.position.set(LANES[lane] + w / 2 + 0.01, wy, -SPAWN_DISTANCE + wz);
        scene.add(win);
        obstacles.push({ mesh: win, lane, type: 'deco' });
        const win2 = new THREE.Mesh(winGeo, winMat);
        win2.position.set(LANES[lane] - w / 2 - 0.01, wy, -SPAWN_DISTANCE + wz);
        win2.rotation.y = Math.PI;
        scene.add(win2);
        obstacles.push({ mesh: win2, lane, type: 'deco' });
      }
    }
  } else if (type < 0.7) {
    // Low barrier
    const h = 1.0;
    const w = 2.4;
    const d = 0.5;
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.4 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(LANES[lane], h / 2, -SPAWN_DISTANCE);
    mesh.castShadow = true;
    scene.add(mesh);

    // Hazard stripes
    const stripeGeo = new THREE.BoxGeometry(w + 0.05, 0.12, d + 0.05);
    const stripeMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    for (let sy = 0.2; sy < h; sy += 0.4) {
      const stripe = new THREE.Mesh(stripeGeo, stripeMat);
      stripe.position.set(LANES[lane], sy, -SPAWN_DISTANCE);
      scene.add(stripe);
      obstacles.push({ mesh: stripe, lane, type: 'deco' });
    }
    obstacles.push({ mesh, lane, type: 'low', h, w, d });
  } else {
    // Overhead barrier - must roll under
    const h = 3;
    const w = 2.6;
    const d = 0.4;
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshStandardMaterial({ color: 0x884422, roughness: 0.5 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(LANES[lane], 2.8, -SPAWN_DISTANCE);
    mesh.castShadow = true;
    scene.add(mesh);

    // Support pillars - tall to signal you can't jump over
    const pillarH = 4;
    const pillarGeo = new THREE.BoxGeometry(0.12, pillarH, 0.12);
    const pillarMat = new THREE.MeshStandardMaterial({ color: 0x777777, metalness: 0.6 });
    for (let px of [-w / 2 + 0.1, w / 2 - 0.1]) {
      const pillar = new THREE.Mesh(pillarGeo, pillarMat);
      pillar.position.set(LANES[lane] + px, pillarH / 2, -SPAWN_DISTANCE);
      pillar.castShadow = true;
      scene.add(pillar);
      obstacles.push({ mesh: pillar, lane, type: 'deco' });
    }
    obstacles.push({ mesh, lane, type: 'overhead', h, w, d });
  }

  spawnCoins(lane);
}

function spawnPowerup() {
  const types = Object.keys(POWERUP_TYPES);
  const type = types[Math.floor(Math.random() * types.length)];
  const config = POWERUP_TYPES[type];
  const lane = Math.floor(Math.random() * 3);

  const group = new THREE.Group();

  // Main body
  const geo = new THREE.BoxGeometry(0.7, 0.7, 0.7);
  const mat = new THREE.MeshStandardMaterial({
    color: config.color, emissive: config.color, emissiveIntensity: 0.6,
    metalness: 0.7, roughness: 0.15
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  group.add(mesh);

  // Inner glow
  const innerGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
  const innerMat = new THREE.MeshBasicMaterial({
    color: config.color, transparent: true, opacity: 0.5
  });
  const inner = new THREE.Mesh(innerGeo, innerMat);
  group.add(inner);

  // Glow ring
  const ringGeo = new THREE.TorusGeometry(0.55, 0.05, 8, 24);
  const ringMat = new THREE.MeshStandardMaterial({
    color: config.color, emissive: config.color, emissiveIntensity: 1,
    transparent: true, opacity: 0.8
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  group.add(ring);

  group.position.set(LANES[lane], 2, -SPAWN_DISTANCE);
  scene.add(group);

  powerupObjects.push({ group, lane, type, collected: false });
}

function spawnCoins(blockedLane) {
  const coinLane = Math.floor(Math.random() * 3);
  if (coinLane === blockedLane && Math.random() > 0.3) return;

  const count = 3 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    const group = new THREE.Group();

    const geo = new THREE.CylinderGeometry(COIN_RADIUS, COIN_RADIUS, 0.08, 20);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xffd700, metalness: 0.9, roughness: 0.15,
      emissive: 0xffaa00, emissiveIntensity: 0.3
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = Math.PI / 2;
    group.add(mesh);

    // Inner ring
    const innerGeo = new THREE.TorusGeometry(COIN_RADIUS * 0.6, 0.02, 8, 16);
    const innerMat = new THREE.MeshStandardMaterial({
      color: 0xffee44, metalness: 0.9, roughness: 0.2
    });
    const inner = new THREE.Mesh(innerGeo, innerMat);
    group.add(inner);

    group.position.set(LANES[coinLane], 1.2, -SPAWN_DISTANCE - i * 2.5);
    group.castShadow = true;
    scene.add(group);
    coinObjects.push({ group, lane: coinLane, collected: false });
  }
}

// ── Controls ──
function setupControls() {
  document.addEventListener('keydown', (e) => {
    if (!gameActive) return;
    initAudio();
    switch (e.code) {
      case 'ArrowLeft': case 'KeyA': moveLeft(); break;
      case 'ArrowRight': case 'KeyD': moveRight(); break;
      case 'ArrowUp': case 'KeyW': case 'Space': jump(); break;
      case 'ArrowDown': case 'KeyS': roll(); break;
    }
  });

  let touchStartX = 0, touchStartY = 0;
  document.addEventListener('touchstart', (e) => {
    initAudio();
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', (e) => {
    if (!gameActive) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (absDx < 20 && absDy < 20) return;
    if (absDx > absDy) {
      if (dx > 0) moveRight(); else moveLeft();
    } else {
      if (dy < 0) jump(); else roll();
    }
  }, { passive: true });

  document.getElementById('btn-left')?.addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); if (gameActive) moveLeft(); });
  document.getElementById('btn-right')?.addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); if (gameActive) moveRight(); });
  document.getElementById('btn-jump')?.addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); if (gameActive) jump(); });
  document.getElementById('btn-down')?.addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); if (gameActive) roll(); });

  document.getElementById('play-btn').addEventListener('click', () => { initAudio(); startGame(); });
  document.getElementById('retry-btn').addEventListener('click', () => { initAudio(); startGame(); });
}

function moveLeft() {
  if (playerLane > 0) { playerLane--; targetX = LANES[playerLane]; }
}
function moveRight() {
  if (playerLane < 2) { playerLane++; targetX = LANES[playerLane]; }
}
function jump() {
  if (!isJumping && !isRolling) {
    isJumping = true;
    jumpTime = 0;
    jumpStartY = player.position.y;
    playSound('jump');
    spawnParticles(player.position.clone(), 5, 0xcccccc, 2, 2, 0.4, 0.06);
  }
}
function roll() {
  if (!isRolling && !isJumping) {
    isRolling = true;
    rollTimer = 0;
  }
}

// ── Game Flow ──
function startGame() {
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('hud').classList.add('active');

  obstacles.forEach(o => { if (o.mesh) scene.remove(o.mesh); });
  coinObjects.forEach(c => { if (c.group) scene.remove(c.group); });
  powerupObjects.forEach(p => { if (p.group) scene.remove(p.group); });
  obstacles = [];
  coinObjects = [];
  powerupObjects = [];
  particles.forEach(p => scene.remove(p.mesh));
  particles = [];

  activePowerups = { magnet: 0, multiplier: 0, jetpack: 0, hoverboard: 0 };
  if (hoverboardMesh) { scene.remove(hoverboardMesh); hoverboardMesh = null; }
  player.position.y = 0;
  player.scale.y = 1;
  player.rotation.z = 0;

  playerLane = 1;
  targetX = LANES[1];
  player.position.set(LANES[1], 0, 0);
  isJumping = false;
  isRolling = false;
  speed = BASE_SPEED;
  score = 0;
  coins = 0;
  spawnTimer = 0;
  powerupSpawnTimer = 30;
  shakeIntensity = 0;
  shakeDuration = 0;
  gameActive = true;
  updateHUD();
}

function gameOver() {
  gameActive = false;
  playSound('crash');
  shakeIntensity = 0.5;
  shakeDuration = 0.5;

  // Explosion particles
  spawnParticles(player.position.clone().add(new THREE.Vector3(0, 1, 0)), 40, 0xff4444, 6, 5, 1, 0.12);
  spawnParticles(player.position.clone().add(new THREE.Vector3(0, 1, 0)), 20, 0xffaa00, 4, 4, 0.8, 0.1);

  setTimeout(() => {
    document.getElementById('hud').classList.remove('active');
    document.getElementById('gameover-screen').style.display = 'flex';
    document.getElementById('go-score').textContent = Math.floor(score);
    document.getElementById('go-coins').textContent = `${coins} coins`;
    if (score > highScore) {
      highScore = Math.floor(score);
      localStorage.setItem('subwayRunnerHigh', highScore);
    }
    document.getElementById('go-best').textContent = `Best: ${highScore}`;
  }, 600);
}

function updateHUD() {
  document.getElementById('score-value').textContent = Math.floor(score);
  document.getElementById('coins-value').textContent = coins;
}

function updatePowerupHUD() {
  for (const type of Object.keys(activePowerups)) {
    const el = document.getElementById(`pu-${type}`);
    const bar = document.getElementById(`pu-${type}-bar`);
    const config = POWERUP_TYPES[type];
    const remaining = activePowerups[type];
    if (remaining > 0) {
      el.classList.add('active');
      bar.style.width = `${(remaining / config.duration) * 100}%`;
    } else {
      el.classList.remove('active');
      bar.style.width = '0%';
    }
  }
}

function createHoverboard() {
  if (hoverboardMesh) return;
  const group = new THREE.Group();

  const deckGeo = new THREE.BoxGeometry(1.2, 0.08, 2.2);
  const deckMat = new THREE.MeshStandardMaterial({
    color: 0x44ff88, metalness: 0.6, roughness: 0.2,
    emissive: 0x22aa55, emissiveIntensity: 0.2
  });
  const deck = new THREE.Mesh(deckGeo, deckMat);
  group.add(deck);

  // Glow underneath
  const glowGeo = new THREE.PlaneGeometry(1.4, 2.4);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0x44ff88, transparent: true, opacity: 0.3, side: THREE.DoubleSide
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.rotation.x = Math.PI / 2;
  glow.position.y = -0.06;
  group.add(glow);

  const wheelGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.06, 12);
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5 });
  for (let x of [-0.5, 0.5]) {
    for (let z of [-0.8, 0.8]) {
      const wheel = new THREE.Mesh(wheelGeo, wheelMat);
      wheel.rotation.z = Math.PI / 2;
      wheel.position.set(x, -0.1, z);
      group.add(wheel);
    }
  }

  group.position.set(player.position.x, 0.15, player.position.z);
  scene.add(group);
  hoverboardMesh = group;
}

// ── Collision ──
function checkCollisions() {
  const px = player.position.x;
  const py = player.position.y;
  const pz = player.position.z;
  const ph = isRolling ? PLAYER_HEIGHT * 0.4 : PLAYER_HEIGHT;
  const pyTop = py + ph;

  for (const obs of obstacles) {
    if (obs.type === 'deco') continue;
    if (obs.lane !== playerLane) continue;

    const oz = obs.mesh.position.z;
    const halfD = obs.d / 2;

    if (pz > oz - halfD && pz < oz + halfD) {
      if (obs.type === 'tall') return true;
      if (obs.type === 'low' && py + 0.3 < obs.h) return true;
      if (obs.type === 'overhead' && pyTop > obs.mesh.position.y - obs.h / 2) return true;
    }
  }

  // Coins
  for (const coin of coinObjects) {
    if (coin.collected) continue;
    const dx = px - coin.group.position.x;
    const dz = pz - coin.group.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 1.5) {
      coin.collected = true;
      scene.remove(coin.group);
      coins++;
      playSound('coin');
      spawnParticles(coin.group.position.clone(), 8, 0xffd700, 3, 3, 0.5, 0.05);
    }
  }

  // Powerups
  for (const pu of powerupObjects) {
    if (pu.collected) continue;
    const dx = px - pu.group.position.x;
    const dz = pz - pu.group.position.z;
    const dy = (py + ph / 2) - pu.group.position.y;
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
    if (dist < 1.5) {
      pu.collected = true;
      scene.remove(pu.group);
      activePowerups[pu.type] = POWERUP_TYPES[pu.type].duration;
      playSound('powerup');
      const config = POWERUP_TYPES[pu.type];
      spawnParticles(pu.group.position.clone(), 25, config.color, 5, 4, 0.8, 0.1);
      showScorePopup(pu.type.toUpperCase(), '#' + config.color.toString(16).padStart(6, '0'));
      if (pu.type === 'hoverboard') createHoverboard();
    }
  }

  if (activePowerups.hoverboard > 0) return false;
  return false;
}

// ── Resize ──
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ── Animate ──
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  if (gameActive) {
    speed = Math.min(speed + SPEED_INCREMENT, MAX_SPEED);
    let scoreMult = 1;
    if (activePowerups.multiplier > 0) scoreMult = POWERUP_TYPES.multiplier.factor;
    score += speed * dt * scoreMult;

    const moveAmt = speed * dt;

    // Lane movement with lean
    const leanTarget = (targetX - player.position.x) > 0.1 ? -0.15 : (targetX - player.position.x) < -0.1 ? 0.15 : 0;
    player.rotation.z += (leanTarget - player.rotation.z) * 8 * dt;
    player.position.x += (targetX - player.position.x) * 12 * dt;

    // Jump
    if (isJumping) {
      jumpTime += dt / JUMP_DURATION;
      if (jumpTime >= 1) {
        isJumping = false;
        player.position.y = 0;
        spawnParticles(player.position.clone(), 6, 0xaaaaaa, 2, 2, 0.4, 0.06);
      } else {
        player.position.y = jumpStartY + JUMP_HEIGHT * Math.sin(jumpTime * Math.PI);
      }
    }

    // Roll
    if (isRolling) {
      rollTimer += dt;
      player.scale.y = 0.4;
      if (rollTimer >= ROLL_DURATION) {
        isRolling = false;
        player.scale.y = 1;
      }
    }

    // Running animation - smooth
    if (!isJumping && !isRolling) {
      const runSpeed = speed * 0.5;
      const bob = Math.sin(t * runSpeed) * 0.05;
      playerParts.body.position.y = 1.1 + bob;
      playerParts.head.position.y = 1.7 + bob;
      playerParts.cap.position.y = 1.9 + bob;
      playerParts.brim.position.y = 1.88 + bob;
      playerParts.leftLeg.position.y = 0.35 + bob;
      playerParts.rightLeg.position.y = 0.35 + bob;
      playerParts.leftArm.position.y = 1.0 + bob;
      playerParts.rightArm.position.y = 1.0 + bob;
      playerParts.leftShoe.position.y = 0.075 + bob;
      playerParts.rightShoe.position.y = 0.075 + bob;
      playerParts.pack.position.y = 1.1 + bob;

      playerParts.leftLeg.rotation.x = Math.sin(t * runSpeed) * 0.6;
      playerParts.rightLeg.rotation.x = -Math.sin(t * runSpeed) * 0.6;
      playerParts.leftArm.rotation.x = -Math.sin(t * runSpeed) * 0.5;
      playerParts.rightArm.rotation.x = Math.sin(t * runSpeed) * 0.5;
    }

    // Running dust particles
    if (!isJumping && Math.random() < 0.3) {
      spawnParticles(
        player.position.clone().add(new THREE.Vector3((Math.random() - 0.5) * 0.3, 0.05, 0.3)),
        1, 0x999999, 1, 1.5, 0.3, 0.04
      );
    }

    // Jetpack flames
    if (activePowerups.jetpack > 0) {
      const targetY = POWERUP_TYPES.jetpack.height;
      player.position.y += (targetY - player.position.y) * 5 * dt;
      // Flame particles from backpack
      for (let i = 0; i < 3; i++) {
        const flameColor = Math.random() > 0.5 ? 0xff4400 : 0xffaa00;
        spawnParticles(
          player.position.clone().add(new THREE.Vector3((Math.random() - 0.5) * 0.2, 0.8, 0.35)),
          1, flameColor, 2, 3, 0.3, 0.08
        );
      }
    } else if (player.position.y > 0.1 && !isJumping) {
      player.position.y = Math.max(0, player.position.y - dt * 15);
    }

    // Move obstacles
    for (const obs of obstacles) {
      obs.mesh.position.z += moveAmt;
    }

    // Move coins
    for (const coin of coinObjects) {
      if (!coin.collected) {
        coin.group.position.z += moveAmt;
        coin.group.rotation.y += 4 * dt;
        coin.group.position.y = 1.2 + Math.sin(t * 3 + coin.group.position.z) * 0.15;
      }
    }

    // Move powerups
    for (const pu of powerupObjects) {
      if (!pu.collected) {
        pu.group.position.z += moveAmt;
        pu.group.rotation.y += 2 * dt;
        pu.group.position.y = 2 + Math.sin(t * 4 + pu.group.position.z * 0.5) * 0.3;
      }
    }

    // Magnet effect
    if (activePowerups.magnet > 0) {
      const magnetConfig = POWERUP_TYPES.magnet;
      for (const coin of coinObjects) {
        if (coin.collected) continue;
        const dx = player.position.x - coin.group.position.x;
        const dz = player.position.z - coin.group.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist < magnetConfig.radius && dist > 0.5) {
          const force = (1 - dist / magnetConfig.radius) * 15 * dt;
          coin.group.position.x += (dx / dist) * force;
          coin.group.position.z += (dz / dist) * force;
          coin.group.position.y += (player.position.y + 1 - coin.group.position.y) * 5 * dt;
        }
      }
    }

    // Update powerup timers
    for (const type of Object.keys(activePowerups)) {
      if (activePowerups[type] > 0) {
        activePowerups[type] -= dt;
        if (activePowerups[type] < 0) activePowerups[type] = 0;
      }
    }

    updatePowerupHUD();

    // Hoverboard
    if (hoverboardMesh && activePowerups.hoverboard > 0) {
      hoverboardMesh.position.x += (player.position.x - hoverboardMesh.position.x) * 10 * dt;
      hoverboardMesh.position.z = player.position.z;
      hoverboardMesh.position.y = player.position.y + 0.15;
      // Hoverboard trail
      if (Math.random() < 0.4) {
        spawnParticles(
          hoverboardMesh.position.clone().add(new THREE.Vector3((Math.random() - 0.5) * 0.8, 0, 0.5)),
          1, 0x44ff88, 1, 2, 0.3, 0.04
        );
      }
    } else if (hoverboardMesh) {
      scene.remove(hoverboardMesh);
      hoverboardMesh = null;
    }

    // Clean up
    obstacles = obstacles.filter(o => {
      if (o.mesh.position.z > DESPAWN_DISTANCE) {
        scene.remove(o.mesh);
        return false;
      }
      return true;
    });
    coinObjects = coinObjects.filter(c => {
      if (c.group.position.z > DESPAWN_DISTANCE) {
        scene.remove(c.group);
        return false;
      }
      return true;
    });
    powerupObjects = powerupObjects.filter(p => {
      if (p.group.position.z > DESPAWN_DISTANCE) {
        scene.remove(p.group);
        return false;
      }
      return true;
    });

    // Spawn
    spawnTimer -= moveAmt;
    if (spawnTimer <= 0) {
      spawnObstacle();
      spawnTimer = 25 + Math.random() * 20;
    }

    powerupSpawnTimer -= moveAmt;
    if (powerupSpawnTimer <= 0) {
      spawnPowerup();
      powerupSpawnTimer = 120 + Math.random() * 80;
    }

    // Move buildings
    for (const b of buildings) {
      b.position.z += moveAmt;
      if (b.position.z > 30) {
        b.position.z -= 300;
      }
    }

    // Move ground details
    for (const g of groundDetails) {
      g.position.z += moveAmt;
      if (g.position.z > 10) {
        g.position.z -= 300;
      }
    }

    // Move clouds
    for (const c of clouds) {
      c.position.z += moveAmt * 0.1;
      if (c.position.z > 30) {
        c.position.z -= 230;
        c.position.x = (Math.random() - 0.5) * 80;
      }
    }

    // Camera follow with smooth interpolation
    const camTargetX = player.position.x * 0.3;
    const camTargetY = 6 + player.position.y * 0.5;
    camera.position.x += (camTargetX - camera.position.x) * 5 * dt;
    camera.position.y += (camTargetY - camera.position.y) * 5 * dt;
    camera.lookAt(player.position.x * 0.5, 1 + player.position.y * 0.3, -15);

    // Camera shake
    if (shakeDuration > 0) {
      shakeDuration -= dt;
      camera.position.x += (Math.random() - 0.5) * shakeIntensity;
      camera.position.y += (Math.random() - 0.5) * shakeIntensity;
      shakeIntensity *= 0.9;
    }

    // Collisions
    if (checkCollisions()) {
      gameOver();
    }

    updateHUD();
  }

  // Update particles
  updateParticles(dt);

  renderer.render(scene, camera);
}

// ── Start ──
init();
</script>
</body>
</html>
