<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sand Physics Toy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #f0c040;
    margin-bottom: 12px;
  }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 12px;
    max-width: 700px;
  }
  .tool-btn {
    padding: 8px 14px;
    border: 1px solid #2a2a3a;
    border-radius: 6px;
    background: #12121a;
    color: #ccc;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
  }
  .tool-btn:hover { background: #1a1a2a; border-color: #444; }
  .tool-btn.active { border-color: var(--c); color: var(--c); background: #1a1a2a; }
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
    font-size: 13px;
    color: #888;
  }
  .controls label { display: flex; align-items: center; gap: 6px; }
  .controls input[type="range"] { width: 80px; accent-color: #f0c040; }
  canvas {
    border: 1px solid #2a2a3a;
    border-radius: 4px;
    cursor: crosshair;
    image-rendering: pixelated;
    max-width: 100%;
  }
  .hint {
    margin-top: 10px;
    font-size: 12px;
    color: #555;
  }
</style>
</head>
<body>
<h1>Sand Physics Toy</h1>
<div class="toolbar" id="toolbar"></div>
<div class="controls">
  <label>Brush: <input type="range" id="brushSize" min="1" max="12" value="3"> <span id="brushVal">3</span></label>
  <button class="tool-btn" id="clearBtn">Clear</button>
  <button class="tool-btn" id="pauseBtn">Pause</button>
</div>
<canvas id="canvas"></canvas>
<p class="hint">Left click/drag to draw · Right click/drag to erase</p>

<script>
const ELEMENTS = {
  empty:   { id: 0, name: 'Eraser',  color: [0,0,0],       active: false },
  sand:    { id: 1, name: 'Sand',    color: [194,170,114],  active: true },
  water:   { id: 2, name: 'Water',   color: [30,120,220],   active: false },
  fire:    { id: 3, name: 'Fire',    color: [240,100,20],   active: false },
  smoke:   { id: 4, name: 'Smoke',   color: [80,80,80],     active: false },
  acid:    { id: 5, name: 'Acid',    color: [120,220,40],   active: false },
  lava:    { id: 6, name: 'Lava',    color: [220,80,10],    active: false },
  plant:   { id: 7, name: 'Plant',   color: [40,160,50],    active: false },
  wall:    { id: 8, name: 'Wall',    color: [140,140,150],  active: false },
  boomer:  { id:9, name: 'Boomer',  color: [240,60,60],    active: false },
  oil:     { id: 10,name: 'Oil',     color: [60,50,30],     active: false },
  steam:   { id: 11,name: 'Steam',   color: [160,170,180],  active: false },
  gunpowder:{id:12,name: 'Powder',   color: [100,100,100],  active: false },
  ice:     { id: 13,name: 'Ice',     color: [170,210,240],  active: false },
};

const EMPTY = 0;
const getTypeId = name => ELEMENTS[name].id;

const CELL = 3;
const COLS = 233;
const ROWS = 160;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

let grid = new Uint8Array(COLS * ROWS);
let life = new Uint8Array(COLS * ROWS);
let nextGrid = new Uint8Array(COLS * ROWS);
let nextLife = new Uint8Array(COLS * ROWS);
let paused = false;
let currentElement = 'sand';
let brushSize = 3;
let mouseDown = false;
let rightMouseDown = false;
let mouseX = -1, mouseY = -1;

function idx(x, y) { return y * COLS + x; }
function inBounds(x, y) { return x >= 0 && x < COLS && y >= 0 && y < ROWS; }
function isEmpty(x, y) { return inBounds(x, y) && grid[idx(x, y)] === EMPTY; }
function isLiquid(id) { return id === getTypeId('water') || id === getTypeId('acid') || id === getTypeId('oil'); }
function isGas(id) { return id === getTypeId('smoke') || id === getTypeId('steam'); }
function isFlammable(id) {
  return id === getTypeId('plant') || id === getTypeId('oil') || id === getTypeId('gunpowder');
}

function setCell(x, y, type, lifeVal) {
  if (!inBounds(x, y)) return;
  const i = idx(x, y);
  grid[i] = type;
  life[i] = lifeVal || 0;
}

function swap(x1, y1, x2, y2) {
  const i1 = idx(x1, y1), i2 = idx(x2, y2);
  const tmpT = grid[i1], tmpL = life[i1];
  grid[i1] = grid[i2]; life[i1] = life[i2];
  grid[i2] = tmpT; life[i2] = tmpL;
}

function tryMove(x, y, nx, ny) {
  if (!inBounds(nx, ny)) return false;
  if (grid[idx(nx, ny)] === EMPTY) {
    swap(x, y, nx, ny);
    return true;
  }
  return false;
}

function trySwapWithLiquid(x, y, nx, ny) {
  if (!inBounds(nx, ny)) return false;
  const ni = idx(nx, ny);
  const nType = grid[ni];
  if (isLiquid(nType) || isGas(nType)) {
    swap(x, y, nx, ny);
    return true;
  }
  return false;
}

function randDir() { return Math.random() < 0.5 ? -1 : 1; }

function updateSand(x, y) {
  const below = inBounds(x, y + 1) ? grid[idx(x, y + 1)] : -1;
  if (below === EMPTY) { swap(x, y, x, y + 1); return; }
  if (isLiquid(below) || isGas(below)) { swap(x, y, x, y + 1); return; }
  const d = randDir();
  const bl = inBounds(x + d, y + 1) ? grid[idx(x + d, y + 1)] : -1;
  if (bl === EMPTY || isLiquid(bl) || isGas(bl)) { swap(x, y, x + d, y + 1); return; }
  const br = inBounds(x - d, y + 1) ? grid[idx(x - d, y + 1)] : -1;
  if (br === EMPTY || isLiquid(br) || isGas(br)) { swap(x, y, x - d, y + 1); return; }
}

function updateWater(x, y) {
  if (tryMove(x, y, x, y + 1)) return;
  const d = randDir();
  if (tryMove(x, y, x + d, y + 1)) return;
  if (tryMove(x, y, x - d, y + 1)) return;
  const spread = Math.floor(Math.random() * 3) + 1;
  for (let s = 1; s <= spread; s++) {
    if (tryMove(x, y, x + d * s, y)) return;
  }
  for (let s = 1; s <= spread; s++) {
    if (tryMove(x, y, x - d * s, y)) return;
  }
}

function updateOil(x, y) {
  if (tryMove(x, y, x, y + 1)) return;
  const d = randDir();
  if (tryMove(x, y, x + d, y + 1)) return;
  if (tryMove(x, y, x - d, y + 1)) return;
  for (let s = 1; s <= 2; s++) {
    if (tryMove(x, y, x + d * s, y)) return;
  }
  for (let s = 1; s <= 2; s++) {
    if (tryMove(x, y, x - d * s, y)) return;
  }
}

function updateAcid(x, y) {
  const below = inBounds(x, y + 1) ? grid[idx(x, y + 1)] : -1;
  if (below !== EMPTY && below !== getTypeId('acid') && below !== getTypeId('wall')) {
    if (Math.random() < 0.03) {
      setCell(x, y + 1, EMPTY, 0);
      if (Math.random() < 0.5) { setCell(x, y, EMPTY, 0); return; }
      setCell(x, y, getTypeId('smoke'), 60 + Math.floor(Math.random() * 40));
      return;
    }
  }
  updateWater(x, y);
}

function updateFire(x, y) {
  life[idx(x, y)]--;
  if (life[idx(x, y)] <= 0) {
    if (Math.random() < 0.3) {
      setCell(x, y, getTypeId('smoke'), 80 + Math.floor(Math.random() * 60));
    } else {
      setCell(x, y, EMPTY, 0);
    }
    return;
  }
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const nx = x + dx, ny = y + dy;
      if (inBounds(nx, ny)) {
        const ni = idx(nx, ny);
        const nType = grid[ni];
        if (isFlammable(nType)) {
          if (nType === getTypeId('gunpowder')) {
            explode(nx, ny, 8 + Math.floor(Math.random() * 6));
          } else {
            setCell(nx, ny, getTypeId('fire'), 30 + Math.floor(Math.random() * 40));
          }
        }
        if (nType === getTypeId('water')) {
          setCell(x, y, EMPTY, 0);
          setCell(nx, ny, getTypeId('steam'), 60 + Math.floor(Math.random() * 40));
          return;
        }
        if (nType === getTypeId('ice')) {
          setCell(nx, ny, getTypeId('water'), 0);
        }
      }
    }
  }
  if (tryMove(x, y, x, y - 1)) return;
  const d = randDir();
  if (tryMove(x, y, x + d, y - 1)) return;
  if (tryMove(x, y, x - d, y - 1)) return;
  if (tryMove(x, y, x + d, y)) return;
}

function updateSmoke(x, y) {
  life[idx(x, y)]--;
  if (life[idx(x, y)] <= 0) { setCell(x, y, EMPTY, 0); return; }
  if (tryMove(x, y, x, y - 1)) return;
  const d = randDir();
  if (tryMove(x, y, x + d, y - 1)) return;
  if (tryMove(x, y, x - d, y - 1)) return;
  if (tryMove(x, y, x + d, y)) return;
}

function updateSteam(x, y) {
  life[idx(x, y)]--;
  if (life[idx(x, y)] <= 0) {
    setCell(x, y, getTypeId('water'), 0);
    return;
  }
  if (tryMove(x, y, x, y - 1)) return;
  const d = randDir();
  if (tryMove(x, y, x + d, y - 1)) return;
  if (tryMove(x, y, x - d, y - 1)) return;
  if (tryMove(x, y, x + d, y)) return;
}

function updateLava(x, y) {
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const nx = x + dx, ny = y + dy;
      if (inBounds(nx, ny)) {
        const ni = idx(nx, ny);
        const nType = grid[ni];
        if (nType === getTypeId('water')) {
          setCell(nx, ny, getTypeId('steam'), 80 + Math.floor(Math.random() * 40));
          if (Math.random() < 0.3) {
            setCell(x, y, getTypeId('wall'), 0);
            return;
          }
        }
        if (isFlammable(nType) && Math.random() < 0.1) {
          setCell(nx, ny, getTypeId('fire'), 40 + Math.floor(Math.random() * 30));
        }
        if (nType === getTypeId('ice')) {
          setCell(nx, ny, getTypeId('water'), 0);
        }
      }
    }
  }
  if (Math.random() < 0.02 && inBounds(x, y - 1) && grid[idx(x, y - 1)] === EMPTY) {
    setCell(x, y - 1, getTypeId('smoke'), 60 + Math.floor(Math.random() * 40));
  }
  if (Math.random() < 0.7) {
    if (tryMove(x, y, x, y + 1)) return;
    const d = randDir();
    if (tryMove(x, y, x + d, y + 1)) return;
    if (tryMove(x, y, x - d, y + 1)) return;
    if (tryMove(x, y, x + d, y)) return;
  }
}

function updatePlant(x, y) {
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const nx = x + dx, ny = y + dy;
      if (inBounds(nx, ny)) {
        const nType = grid[idx(nx, ny)];
        if (nType === getTypeId('water') && Math.random() < 0.005) {
          setCell(nx, ny, EMPTY, 0);
          const growDx = randDir(), growDy = randDir();
          if (isEmpty(x + growDx, y + growDy)) {
            setCell(x + growDx, y + growDy, getTypeId('plant'), 0);
          }
        }
      }
    }
  }
}

function updateGunpowder(x, y) {
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const nx = x + dx, ny = y + dy;
      if (inBounds(nx, ny)) {
        if (grid[idx(nx, ny)] === getTypeId('fire') || grid[idx(nx, ny)] === getTypeId('lava')) {
          explode(x, y, 10 + Math.floor(Math.random() * 8));
          return;
        }
      }
    }
  }
  updateSand(x, y);
}

function updateIce(x, y) {
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const nx = x + dx, ny = y + dy;
      if (inBounds(nx, ny)) {
        const nType = grid[idx(nx, ny)];
        if (nType === getTypeId('water') && Math.random() < 0.002) {
          setCell(nx, ny, getTypeId('ice'), 0);
        }
      }
    }
  }
}

function explode(cx, cy, radius) {
  for (let dy = -radius; dy <= radius; dy++) {
    for (let dx = -radius; dx <= radius; dx++) {
      if (dx * dx + dy * dy > radius * radius) continue;
      const nx = cx + dx, ny = cy + dy;
      if (!inBounds(nx, ny)) continue;
      const ni = idx(nx, ny);
      if (grid[ni] === getTypeId('wall')) continue;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < radius * 0.3) {
        if (Math.random() < 0.6) {
          setCell(nx, ny, getTypeId('fire'), 20 + Math.floor(Math.random() * 30));
        } else if (Math.random() < 0.5) {
          setCell(nx, ny, getTypeId('smoke'), 60 + Math.floor(Math.random() * 60));
        } else {
          setCell(nx, ny, EMPTY, 0);
        }
      } else {
        if (Math.random() < 0.4) {
          setCell(nx, ny, getTypeId('fire'), 15 + Math.floor(Math.random() * 20));
        } else {
          setCell(nx, ny, EMPTY, 0);
        }
      }
    }
  }
}

function updateBoomer(x, y) {
  life[idx(x, y)]++;
  if (life[idx(x, y)] > 60) {
    explode(x, y, 6 + Math.floor(Math.random() * 4));
  }
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const nx = x + dx, ny = y + dy;
      if (inBounds(nx, ny)) {
        const nType = grid[idx(nx, ny)];
        if (nType === getTypeId('fire') || nType === getTypeId('lava')) {
          explode(x, y, 6 + Math.floor(Math.random() * 4));
          return;
        }
      }
    }
  }
}

function update() {
  for (let y = ROWS - 1; y >= 0; y--) {
    const leftToRight = (y % 2 === 0);
    for (let i = 0; i < COLS; i++) {
      const x = leftToRight ? i : COLS - 1 - i;
      const cellIdx = idx(x, y);
      const type = grid[cellIdx];
      if (type === EMPTY) continue;
      switch (type) {
        case getTypeId('sand'): updateSand(x, y); break;
        case getTypeId('water'): updateWater(x, y); break;
        case getTypeId('oil'): updateOil(x, y); break;
        case getTypeId('acid'): updateAcid(x, y); break;
        case getTypeId('fire'): updateFire(x, y); break;
        case getTypeId('smoke'): updateSmoke(x, y); break;
        case getTypeId('steam'): updateSteam(x, y); break;
        case getTypeId('lava'): updateLava(x, y); break;
        case getTypeId('plant'): updatePlant(x, y); break;
        case getTypeId('gunpowder'): updateGunpowder(x, y); break;
        case getTypeId('ice'): updateIce(x, y); break;
        case getTypeId('boomer'): updateBoomer(x, y); break;
      }
    }
  }
}

function render() {
  const imageData = ctx.createImageData(canvas.width, canvas.height);
  const data = imageData.data;
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const type = grid[idx(x, y)];
      let r, g, b;
      if (type === EMPTY) {
        r = 12; g = 12; b = 16;
      } else {
        const el = Object.values(ELEMENTS).find(e => e.id === type);
        const base = el ? el.color : [200, 200, 200];
        const cellLife = life[idx(x, y)];
        if (type === getTypeId('fire')) {
          const flicker = Math.random() * 40;
          r = Math.min(255, base[0] + flicker);
          g = Math.min(255, base[1] + flicker * 0.5);
          b = base[2];
        } else if (type === getTypeId('smoke') || type === getTypeId('steam')) {
          const alpha = Math.min(1, cellLife / 60);
          const v = Math.floor(base[0] * alpha);
          r = v; g = v; b = v;
        } else if (type === getTypeId('lava')) {
          const pulse = Math.sin(Date.now() * 0.005 + x * 0.1 + y * 0.1) * 20;
          r = Math.min(255, base[0] + pulse);
          g = Math.min(255, base[1] + pulse * 0.5);
          b = base[2];
        } else if (type === getTypeId('boomer')) {
          const pulse = Math.sin(cellLife * 0.3) * 30;
          r = Math.min(255, base[0] + pulse);
          g = base[1];
          b = base[2];
        } else {
          const variation = ((x * 7 + y * 13) % 20) - 10;
          r = Math.max(0, Math.min(255, base[0] + variation));
          g = Math.max(0, Math.min(255, base[1] + variation));
          b = Math.max(0, Math.min(255, base[2] + variation));
        }
      }
      for (let cy = 0; cy < CELL; cy++) {
        for (let cx = 0; cx < CELL; cx++) {
          const px = (x * CELL + cx);
          const py = (y * CELL + cy);
          const pi = (py * canvas.width + px) * 4;
          data[pi] = r;
          data[pi + 1] = g;
          data[pi + 2] = b;
          data[pi + 3] = 255;
        }
      }
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

function drawBrush(cx, cy, erase) {
  const r = brushSize;
  const type = erase ? EMPTY : getTypeId(currentElement);
  for (let dy = -r; dy <= r; dy++) {
    for (let dx = -r; dx <= r; dx++) {
      if (dx * dx + dy * dy > r * r) continue;
      const nx = cx + dx, ny = cy + dy;
      if (!inBounds(nx, ny)) continue;
      if (erase) {
        setCell(nx, ny, EMPTY, 0);
      } else if (grid[idx(nx, ny)] === EMPTY) {
        if (type === getTypeId('fire')) {
          setCell(nx, ny, type, 30 + Math.floor(Math.random() * 40));
        } else if (type === getTypeId('smoke')) {
          setCell(nx, ny, type, 80 + Math.floor(Math.random() * 60));
        } else if (type === getTypeId('steam')) {
          setCell(nx, ny, type, 80 + Math.floor(Math.random() * 60));
        } else if (type === getTypeId('boomer')) {
          setCell(nx, ny, type, 0);
        } else {
          setCell(nx, ny, type, 0);
        }
      }
    }
  }
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  return { x: Math.floor(px / CELL), y: Math.floor(py / CELL) };
}

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  const pos = getCanvasPos(e);
  mouseX = pos.x; mouseY = pos.y;
  if (e.button === 2) {
    rightMouseDown = true;
    drawBrush(pos.x, pos.y, true);
  } else {
    mouseDown = true;
    drawBrush(pos.x, pos.y, false);
  }
});

canvas.addEventListener('mousemove', e => {
  const pos = getCanvasPos(e);
  mouseX = pos.x; mouseY = pos.y;
  if (mouseDown) drawBrush(pos.x, pos.y, false);
  if (rightMouseDown) drawBrush(pos.x, pos.y, true);
});

canvas.addEventListener('mouseup', () => { mouseDown = false; rightMouseDown = false; });
canvas.addEventListener('mouseleave', () => { mouseDown = false; rightMouseDown = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const pos = getCanvasPos(touch);
  mouseX = pos.x; mouseY = pos.y;
  drawBrush(pos.x, pos.y, false);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const pos = getCanvasPos(touch);
  mouseX = pos.x; mouseY = pos.y;
  drawBrush(pos.x, pos.y, false);
}, { passive: false });

const toolbar = document.getElementById('toolbar');
Object.keys(ELEMENTS).forEach(key => {
  const el = ELEMENTS[key];
  if (key === 'empty') return;
  const btn = document.createElement('button');
  btn.className = 'tool-btn' + (el.active ? ' active' : '');
  btn.textContent = el.name;
  btn.style.setProperty('--c', `rgb(${el.color.join(',')})`);
  btn.addEventListener('click', () => {
    currentElement = key;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  toolbar.appendChild(btn);
});

document.getElementById('brushSize').addEventListener('input', e => {
  brushSize = parseInt(e.target.value);
  document.getElementById('brushVal').textContent = brushSize;
});

document.getElementById('clearBtn').addEventListener('click', () => {
  grid.fill(0);
  life.fill(0);
});

document.getElementById('pauseBtn').addEventListener('click', function() {
  paused = !paused;
  this.textContent = paused ? 'Play' : 'Pause';
});

function loop() {
  if (!paused) {
    update();
  }
  render();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
