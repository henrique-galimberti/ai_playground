<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .container {
    max-width: 600px;
    padding: 40px 20px;
    width: 100%;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #f0c040;
    margin-bottom: 8px;
  }
  .subtitle {
    color: #888;
    font-size: 14px;
    margin-bottom: 40px;
  }
  .experiment {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: #12121a;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    margin-bottom: 12px;
    text-decoration: none;
    transition: all 0.2s ease;
  }
  .experiment:hover {
    border-color: #f0c040;
    background: #1a1a2a;
    transform: translateY(-1px);
  }
  .icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: #1a1a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .info { flex: 1; }
  .info h2 {
    font-size: 15px;
    font-weight: 600;
    color: #e0e0e0;
    margin-bottom: 2px;
  }
  .info p {
    font-size: 12px;
    color: #888;
    line-height: 1.4;
  }
  .arrow {
    color: #555;
    font-size: 18px;
    transition: color 0.2s;
  }
  .experiment:hover .arrow { color: #f0c040; }
</style>
</head>
<body>
<div class="container">
  <h1>AI Playground</h1>
  <p class="subtitle">Experiments and prototypes</p>

  <a class="experiment" href="ant-colony-simulator/">
    <div class="icon">🐜</div>
    <div class="info">
      <h2>Ant Colony Simulator</h2>
      <p>Pheromone-based foraging with emergent pathfinding</p>
    </div>
    <span class="arrow">→</span>
  </a>
</div>
</body>
</html>
